<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>范润然阅读回测 · 学生端</title>
    <link rel="stylesheet" href="./fanrunran-reading-page.css" />
  </head>
  <body data-exam-id="fanrunran_retro" data-exam-title="范润然阅读回测">
    <main class="page">
      <header class="top-card">
        <div>
          <p class="kicker" id="pageKicker">学生做题端口 · 回测卷</p>
          <h1 id="pageTitle">阅读回测</h1>
          <p class="subtitle" id="pageSubtitle">读取中...</p>
        </div>

        <aside class="mode-panel" aria-label="本页用途">
          <strong>只给学生作答</strong>
          <span id="axisSummary">A1-A8 综合观察</span>
          <span id="timeSummary">建议用时：20 分钟</span>
        </aside>

        <div class="toolbar" aria-label="作答工具">
          <span class="status" id="saveStatus">尚未开始作答。</span>
          <div class="timer-panel" aria-label="计时器">
            <span class="timer-display" id="timerDisplay">00:00:00</span>
            <button type="button" class="primary" id="timerStartBtn">开始计时</button>
            <button type="button" id="timerPauseBtn">暂停</button>
            <button type="button" id="timerResetBtn">重置</button>
          </div>
          <div class="actions" aria-label="导出与页面切换">
            <button type="button" id="exportJsonBtn">导出画像输入</button>
            <button type="button" id="exportTxtBtn">导出作答文本</button>
            <button type="button" data-print-page>打印</button>
            <button type="button" id="clearBtn">清空</button>
            <a class="button-link" id="reviewLink" href="./fanrunran-reading-retro-review.html">助学者解读</a>
            <a class="button-link" href="./fanrunran-10-reading-pack.html">10篇总控</a>
          </div>
        </div>
      </header>

      <form id="examForm" autocomplete="off">
        <section class="meta-grid" aria-label="学生信息">
          <label>姓名
            <input type="text" name="student_name" value="范润然" />
          </label>
          <label>年级
            <input type="text" name="grade" value="五年级" />
          </label>
          <label>年龄
            <input type="number" name="age" min="6" max="18" placeholder="例如：11" />
          </label>
          <label>日期
            <input type="text" name="exam_date" placeholder="例如：2026-06-13" />
          </label>
        </section>

        <section class="book-spread" aria-label="阅读材料与题目">
          <article class="book-page reading-page">
            <div class="section-head">
              <h2>回测原卷</h2>
              <span class="small-note" id="sourceNote">完整原稿</span>
            </div>
            <pre class="source-pre" id="sourceText">正在加载回测卷...</pre>
          </article>

          <section class="book-page questions-page">
            <div class="section-head">
              <h2>作答区</h2>
              <span class="small-note">自动保存 · 可导出画像输入</span>
            </div>
            <div class="question-list" id="questionList"></div>
          </section>
        </section>
      </form>

      <p class="footer-note">学生端只用于独立作答。导出的 JSON 可交给助学者进行批改与画像回流。</p>
    </main>

    <script>
      const retroPacks = {
        8: {
          examId: "fanrunran_retro_08_jiashu",
          examTitle: "范润然回测卷08 · 家书",
          kicker: "学生做题端口 · 第 8 篇",
          title: "回测卷一：家书",
          subtitle: "A5 写人记事主战场回测：心理变化、细节作用、精神品质和结尾选择。",
          axes: "A5 推论与人物 / A6 证据整合 / A7 评价迁移",
          time: "建议用时：20 分钟",
          note: "记叙写人 · A5 主战场",
          source: "./fanrunran-reading-output-08-jiashu.md",
          questions: [
            { title: "一、心理变化链", score: "5 分", stem: "请按照故事发展的顺序，梳理小薇的心理变化过程。", fields: [
              ["上山前", "q1_before", "例如：委屈、不愿留守、想调走"],
              ["看到炒面与家书", "q1_letter", "例如：震撼、感动"],
              ["在烈士衣冠冢前", "q1_tomb", "例如：自责、敬意"],
              ["返程及3个月后", "q1_after", "例如：思索、坚定、主动留守"]
            ] },
            { title: "二、细节作用选择题", score: "2 分", stem: "文中多次出现“炒面”这一细节有什么作用？请选择不正确的一项，并说明排除理由。", fields: [
              ["我选择", "q2_choice", "A / B / C / D"],
              ["理由", "q2_reason", "请回到原文说明这个选项为什么不恰当。"]
            ] },
            { title: "三、修辞赏析", score: "3 分", stem: "从修辞手法的角度赏析：她的指尖触到纸背细密的凹点，像触到某种沉睡的心跳。", fields: [
              ["修辞手法", "q3_method", "比喻 / 其他"],
              ["表达效果", "q3_effect", "写出了什么触感、情感或历史连接？"]
            ] },
            { title: "四、精神品质分析", score: "4 分", stem: "两处“化作雪山的石头”凸显了罗忠诚怎样的精神品质？请简要分析。", fields: [
              ["人物品质", "q4_trait", "例如：忠诚、坚定、牺牲、守护祖国"],
              ["原文证据与分析", "q4_evidence", "至少结合两句话说明。"]
            ] },
            { title: "五、结尾选择", score: "4 分", stem: "A. 界碑旁，格桑花开得正盛。 B. 小薇读懂了那一封家书。你认为哪一句更适合作为本文结尾？", fields: [
              ["我选择", "q5_choice", "A / B"],
              ["理由", "q5_reason", "结合文章内容、意象、人物变化和中心说明。"]
            ] }
          ]
        },
        9: {
          examId: "fanrunran_retro_09_monument",
          examTitle: "范润然回测卷09 · 人民英雄纪念碑",
          kicker: "学生做题端口 · 第 9 篇",
          title: "回测卷二：人民英雄纪念碑的设计智慧",
          subtitle: "说明文回测：信息定位、说明方法、判断题排雷和句子含义理解。",
          axes: "A2 说明文读法 / A3 信息定位 / A4 篇章整合 / A6 证据整合",
          time: "建议用时：15 分钟",
          note: "说明文 · 设计智慧",
          source: "./fanrunran-reading-output-09-monument.md",
          questions: [
            { title: "一、设计智慧排雷", score: "2 分", stem: "下列哪一项不属于人民英雄纪念碑的设计智慧？请写出选项并说明依据。", fields: [
              ["我选择", "q1_choice", "A / B / C / D"],
              ["依据", "q1_reason", "说明它为什么不是“设计智慧”。"]
            ] },
            { title: "二、说明方法与好处", score: "4 分", stem: "判断两个句子的说明方法，并任选一句分析这样写的好处。", fields: [
              ["第（1）句说明方法", "q2_method_1", "①打比方 / ②举例子 / ③列数字 / ④作比较"],
              ["第（2）句说明方法", "q2_method_2", "①打比方 / ②举例子 / ③列数字 / ④作比较"],
              ["我选第几句", "q2_selected", "第（1）句 / 第（2）句"],
              ["好处分析", "q2_effect", "结合说明对象和说明效果作答。"]
            ] },
            { title: "三、判断题", score: "3 分", stem: "结合文章内容判断三句话是否正确，并说明你最不确定的一句。", fields: [
              ["（1）", "q3_1", "√ / ×"],
              ["（2）", "q3_2", "√ / ×"],
              ["（3）", "q3_3", "√ / ×"],
              ["最不确定的一句与理由", "q3_reason", "请写回原文查证的依据。"]
            ] },
            { title: "四、句子含义理解", score: "2 分", stem: "你如何理解“用永恒的姿态守护着民族的集体记忆”？", fields: [
              ["我的理解", "q4_answer", "从纪念碑材料、浮雕、碑文和历史记忆角度回答。"]
            ] }
          ]
        },
        10: {
          examId: "fanrunran_retro_10_literary_combo",
          examTitle: "范润然回测卷10 · 文体综合回测",
          kicker: "学生做题端口 · 第 10 篇",
          title: "回测卷三 + 四：文体综合回测",
          subtitle: "文言文 + 课内外对比阅读：检查文体读法、断句翻译、动静描写和对比证据。",
          axes: "A1 基础语言 / A2 文体读法 / A3 信息定位 / A5 描写推断 / A6 证据整合 / A7 迁移",
          time: "建议用时：38 分钟，可拆成两次",
          note: "文言文 + 对比阅读",
          source: "./fanrunran-reading-output-10-literary-combo.md",
          questions: [
            { title: "一、《一字之师》词义题", score: "2 分", stem: "“齐己矍然，不觉兼三衣叩地膜拜”中的“兼”字是什么意思？", fields: [
              ["我选择", "q1_choice", "A / B / C / D"],
              ["判断依据", "q1_reason", "结合上下文说明。"]
            ] },
            { title: "二、《一字之师》断句与翻译", score: "4 分", stem: "给“齐己因携所为诗往谒焉”划分停顿，并用自己的话说意思。", fields: [
              ["停顿选择", "q2_pause", "A / B / C / D"],
              ["句子意思", "q2_translation", "结合注释翻译。"]
            ] },
            { title: "三、《一字之师》成语判断", score: "2 分", stem: "哪个成语最适合形容本文中修改诗句的情节？", fields: [
              ["我选择", "q3_choice", "A / B / C / D"],
              ["理由", "q3_reason", "说明为什么合适。"]
            ] },
            { title: "四、《一字之师》人物与启示", score: "6 分", stem: "齐己是一个怎样的人？你从故事中受到怎样的启示？", fields: [
              ["齐己的人物特点", "q4_trait", "例如：虚心、尊重意见、追求诗艺"],
              ["启示", "q4_lesson", "结合故事讲清道理。"]
            ] },
            { title: "五、对比阅读信息表", score: "6 分", stem: "联读《威尼斯的小艇》和《水巷人家》，完成两座城市的信息。", fields: [
              ["威尼斯生活画面", "q5_venice", "填写 ①②"],
              ["苏州城市称呼与交通工具", "q5_suzhou_base", "填写 ③④"],
              ["苏州生活画面", "q5_suzhou_life", "填写 ⑤⑥"]
            ] },
            { title: "六、动静描写对比", score: "5 分", stem: "对比船夫和船娘的描写，说明同为动态描写但效果不同。", fields: [
              ["描写类型", "q6_type", "动态 / 静态"],
              ["船夫描写效果", "q6_boatman", "表现了什么？"],
              ["船娘描写效果", "q6_boatwoman", "表现了什么？"],
              ["朗读语气", "q6_tone", "船夫：__；船娘：__"]
            ] },
            { title: "七、理解选择题", score: "2 分", stem: "下面关于两篇文章的理解，不恰当的一项是？", fields: [
              ["我选择", "q7_choice", "A / B / C / D"],
              ["排除理由", "q7_reason", "回到两篇文章说明。"]
            ] },
            { title: "八、结尾含义理解", score: "2 分", stem: "为什么结尾说“那便是苏州的魂，从未真正离去”？", fields: [
              ["我的理解", "q8_answer", "联系上下文回答。"]
            ] }
          ]
        }
      };

      const params = new URLSearchParams(window.location.search);
      const packId = params.get("pack") || "8";
      const pack = retroPacks[packId] || retroPacks[8];

      document.body.dataset.examId = pack.examId;
      document.body.dataset.examTitle = pack.examTitle;
      document.title = `${pack.examTitle} · 学生端`;
      document.querySelector("#pageKicker").textContent = pack.kicker;
      document.querySelector("#pageTitle").textContent = pack.title;
      document.querySelector("#pageSubtitle").textContent = pack.subtitle;
      document.querySelector("#axisSummary").textContent = pack.axes;
      document.querySelector("#timeSummary").textContent = pack.time;
      document.querySelector("#sourceNote").textContent = pack.note;
      document.querySelector("#reviewLink").href = `./fanrunran-reading-retro-review.html?pack=${packId}`;

      fetch(pack.source)
        .then((response) => {
          if (!response.ok) throw new Error("source missing");
          return response.text();
        })
        .then((text) => {
          document.querySelector("#sourceText").textContent = text;
        })
        .catch(() => {
          document.querySelector("#sourceText").textContent = "回测卷原稿加载失败，请从首页打开完整原稿。";
        });

      const questionList = document.querySelector("#questionList");
      questionList.innerHTML = pack.questions.map((question) => `
        <section class="question">
          <div class="question-head">
            <h3>${question.title}</h3>
            <span class="score">${question.score}</span>
          </div>
          <p class="stem">${question.stem}</p>
          <div class="subparts">
            ${question.fields.map(([label, name, placeholder]) => `
              <label>${label}
                <textarea class="answer-box ${question.fields.length > 2 ? "short" : ""}" name="${name}" placeholder="${placeholder}"></textarea>
              </label>
            `).join("")}
          </div>
        </section>
      `).join("");
    </script>
    <script src="./fanrunran-reading-page.js"></script>
  </body>
</html>
